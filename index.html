document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b34b1168-f58c-46e5-90b5-7dfbc5a78849\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#16181B;background:#F4F5F7;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#CfD3D7;border-radius:6px;border:2px solid transparent;background-clip:content-box}\n  ::-webkit-scrollbar-track{background:transparent}\n  input,button{font-family:inherit}\n  ._lnk{color:#1C6FE0;cursor:pointer}\n  ._lnk:hover{text-decoration:underline}\n  ._inp{outline:none}\n  ._inp:focus{border-color:#1C6FE0 !important}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"app-root\" style=\"display:flex;height:100vh;min-width:1180px;overflow:hidden;background:#F4F5F7\">\n\n  <!-- SIDEBAR -->\n  <aside style=\"width:236px;flex:0 0 236px;background:#fff;border-right:1px solid #E8EAEC;display:flex;flex-direction:column;height:100%\">\n    <div style=\"height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid #F0F1F2\">\n      <div style=\"line-height:1\">\n        <div style=\"font-weight:800;font-size:17px;letter-spacing:-.3px;color:#EE6A2B\">skroutz<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:9px;letter-spacing:.4px;color:#16181B;margin-top:1px\">merchants<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"color:#B6BBC0;font-size:12px\">⌄<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding:12px 12px 6px\">\n      <div style=\"position:relative\">\n        <input placeholder=\"Κοοqle\" class=\"_inp\" style=\"width:100%;height:34px;border:1px solid #E5E7EA;border-radius:8px;padding:0 30px 0 12px;font-size:13px;background:#F7F8F9\">\n        <span style=\"position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#A2A8AE;font-size:13px\">⌕<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:4px 10px 24px\">\n      <div onclick=\"{{ goDashboard }}\" style=\"display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:#41464C;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▦<\u002Fspan>Επισκόπηση<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▤<\u002Fspan>Παραγγελίες<\u002Fspan><span style=\"color:#C2C7CC;font-size:11px\">⌄<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ ordersNav }}\" as=\"n\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span>{{ n.label }}<\u002Fspan><sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#EEF0F2;color:#7A8088;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center\">{{ n.badge }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">◈<\u002Fspan>After sales <span style=\"background:#EAF1FD;color:#1C6FE0;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Νέο<\u002Fspan><\u002Fspan><span style=\"color:#C2C7CC;font-size:11px\">⌄<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ afterNav }}\" as=\"n\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span>{{ n.label }}<\u002Fspan><sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#EEF0F2;color:#7A8088;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center\">{{ n.badge }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;font-size:13px;color:#41464C;cursor:pointer\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▱<\u002Fspan>Fulfilled by Skroutz (FBS)<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">◷<\u002Fspan>Προώθηση προϊόντων<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Όλα τα εργαλεία<\u002Fdiv>\n      <div onclick=\"{{ goDashboard }}\" style=\"padding:6px 10px 6px 33px;border-radius:7px;font-size:13px;font-weight:700;color:#1C6FE0;background:#EAF1FD;cursor:pointer;border-left:3px solid #1C6FE0\">Διαφήμιση<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Skroutz Coins<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Price Optimizer<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Deals<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Κουπόνια <span style=\"background:#FDF2D6;color:#B07A0E;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Beta<\u002Fspan><\u002Fdiv>\n\n      <div style=\"height:1px;background:#F0F1F2;margin:10px 8px\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;font-size:13px;color:#41464C;cursor:pointer\">Skroutz Χρηματοδότηση <span style=\"background:#EAF1FD;color:#1C6FE0;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Νέο<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ bottomNav }}\" as=\"b\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:#41464C;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">{{ b.icon }}<\u002Fspan>{{ b.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <div style=\"flex:1;display:flex;flex-direction:column;height:100%;min-width:0\">\n    <!-- TOPBAR -->\n    <header style=\"height:58px;flex:0 0 58px;background:#fff;border-bottom:1px solid #E8EAEC;display:flex;align-items:center;gap:16px;padding:0 24px\">\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;color:#6A7178;font-size:16px\">\n        <span style=\"cursor:pointer\">⚲<\u002Fspan><span style=\"cursor:pointer\">💬<\u002Fspan><span style=\"cursor:pointer\">📣<\u002Fspan><span style=\"cursor:pointer\">?<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;background:#F4F5F7;border:1px solid #E8EAEC;border-radius:9px;padding:5px 11px\">\n        <span style=\"font-size:13px;color:#41464C;font-weight:600\">🚚 Μπλάνας<\u002Fspan>\n        <span style=\"background:#1E7E40;color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px\">Ενεργό<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:32px;height:32px;border-radius:50%;background:#16181B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">T<\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- CONTENT -->\n    <main style=\"flex:1;overflow-y:auto;padding:26px 32px 70px\">\n\n      <!-- ============ DASHBOARD (Screen_1 / Screen_3) ============ -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:1180px;margin:0 auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px\">\n          <div style=\"font-size:22px;font-weight:800;letter-spacing:-.4px\">Όλες οι καμπάνιες<\u002Fdiv>\n          <div onclick=\"{{ goGoal }}\" style=\"height:42px;border-radius:10px;padding:0 20px;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:#fff;background:#16181B;cursor:pointer\" style-hover=\"background:#000\">+ Νέα διαφήμιση<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:center;gap:10px;flex:1\">\n            <div style=\"display:flex;align-items:center;gap:7px;height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 13px;font-size:13px;color:#41464C;background:#fff;cursor:pointer\">(5/06/25 - 10/06/25) ⌄<\u002Fdiv>\n            <div style=\"position:relative;flex:1;max-width:420px\">\n              <span style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#A2A8AE;font-size:13px\">⌕<\u002Fspan>\n              <input placeholder=\"Αναζήτηση καμπάνιας\" class=\"_inp\" style=\"width:100%;height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 12px 0 32px;font-size:13px;background:#fff\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 15px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#41464C;background:#fff;cursor:pointer\">⤓ Report<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- stat strip -->\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;padding:16px 22px;margin-bottom:16px;display:flex;gap:46px;flex-wrap:wrap\">\n          <sc-for list=\"{{ statStrip }}\" as=\"s\" hint-placeholder-count=\"7\">\n            <div><div style=\"font-size:12px;color:#8A9097;margin-bottom:4px\">{{ s.label }}<\u002Fdiv><div style=\"font-size:17px;font-weight:800;letter-spacing:-.3px\">{{ s.value }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- chart -->\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;padding:20px 22px;margin-bottom:26px\">\n          <div style=\"display:flex;align-items:flex-end;gap:30px;height:170px;padding:0 6px\">\n            <sc-for list=\"{{ chartBars }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"flex:1;display:flex;align-items:flex-end;justify-content:center;gap:7px;height:100%\">\n                <div style=\"width:26px;border-radius:4px 4px 0 0;background:#3B9BF0;height:{{ b.a }}%\"><\u002Fdiv>\n                <div style=\"width:26px;border-radius:4px 4px 0 0;background:#4DBE7A;height:{{ b.b }}%\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:flex-end;gap:20px;font-size:12px;color:#6A7178;margin-top:14px\">\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#3B9BF0\"><\u002Fspan>Τζίρος<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#4DBE7A\"><\u002Fspan>Κόστος<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SECTION: Ενίσχυση πωλήσεων -->\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:14px\">Στόχος: Ενίσχυση πωλήσεων<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;overflow:hidden;margin-bottom:34px\">\n          <div style=\"display:grid;grid-template-columns:2.4fr 1fr 1fr 1fr;padding:13px 22px;font-size:12px;color:#8A9097;background:#FAFBFC;border-bottom:1px solid #F0F1F2\">\n            <div>Καμπάνια<\u002Fdiv><div style=\"text-align:right\">Τζίρος<\u002Fdiv><div style=\"text-align:right\">Πωλήσεις<\u002Fdiv><div style=\"text-align:right\">Κόστος<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ goStandard }}\" style=\"display:grid;grid-template-columns:2.4fr 1fr 1fr 1fr;padding:16px 22px;font-size:13.5px;align-items:center;cursor:pointer\" style-hover=\"background:#FAFBFC\">\n            <div style=\"display:flex;align-items:center;gap:13px\"><div style=\"{{ swOnTrack }}\"><div style=\"{{ swOnKnob }}\"><\u002Fdiv><\u002Fdiv><span style=\"color:#1C6FE0;font-weight:600\">{{ enisxysiName }}<\u002Fspan><\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">50<\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">2<\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">100€<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SECTION: Υπόλοιποι στόχοι -->\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:14px\">Υπόλοιποι στόχοι<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:1.8fr 1.1fr 1fr 1fr 1fr 1fr 1.2fr;padding:13px 22px;font-size:12px;color:#8A9097;background:#FAFBFC;border-bottom:1px solid #F0F1F2\">\n            <div>Καμπάνια<\u002Fdiv><div>Στόχος<\u002Fdiv><div>Budget<\u002Fdiv><div style=\"text-align:right\">Τζίρος<\u002Fdiv><div style=\"text-align:right\">Πωλήσεις<\u002Fdiv><div style=\"text-align:right\">Κόστος<\u002Fdiv><div style=\"text-align:right\">Διάρκεια<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ otherCampaigns }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ c.onOpen }}\" style=\"display:grid;grid-template-columns:1.8fr 1.1fr 1fr 1fr 1fr 1fr 1.2fr;padding:18px 22px;font-size:13.5px;align-items:center;border-top:1px solid #F4F5F6;cursor:pointer\" style-hover=\"background:#FAFBFC\">\n              <div style=\"display:flex;align-items:center;gap:13px\"><div style=\"{{ swOnTrack }}\"><div style=\"{{ swOnKnob }}\"><\u002Fdiv><\u002Fdiv><span style=\"color:#1C6FE0;font-weight:600\">{{ c.name }}<\u002Fspan><\u002Fdiv>\n              <div style=\"color:#41464C\">{{ c.goal }}<\u002Fdiv>\n              <div style=\"color:#6A7178\">{{ c.budget }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.turnover }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.sales }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.cost }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#6A7178;font-size:12.5px\">{{ c.dur }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ GOAL SELECTION (Screen_2_A / Screen_2_B) ============ -->\n      <sc-if value=\"{{ isGoal }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:1080px;margin:0 auto\">\n        <div onclick=\"{{ goDashboard }}\" style=\"font-size:13px;color:#6A7178;cursor:pointer;margin-bottom:18px\">‹ Πίσω στις καμπάνιες<\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:600;color:#3A3F45;margin-bottom:6px\">Skroutz ads<\u002Fdiv>\n        <div style=\"font-size:30px;font-weight:800;letter-spacing:-.6px;margin-bottom:36px\">Ποιος είναι ο στόχος σου;<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:400px 1fr;gap:28px;align-items:start\">\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ goals }}\" as=\"g\" hint-placeholder-count=\"5\">\n              <div onclick=\"{{ g.onSelect }}\" style=\"border-radius:13px;padding:20px 22px;cursor:pointer;{{ g.rowStyle }}\">\n                <div style=\"font-size:15px;font-weight:700;{{ g.titleStyle }}\">{{ g.title }}<\u002Fdiv>\n                <sc-if value=\"{{ g.meta }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12.5px;color:#4DBE7A;margin-top:5px;font-weight:600\">{{ g.meta }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:18px;padding:34px 38px;min-height:300px\">\n            <div style=\"font-size:21px;font-weight:800;margin-bottom:16px\">{{ goalDetail.title }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#41464C;line-height:1.65;margin-bottom:18px\">{{ goalDetail.body }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#16181B;font-weight:600;margin-bottom:26px\">{{ goalDetail.stat }}<\u002Fdiv>\n            <div onclick=\"{{ continueGoal }}\" style=\"height:48px;border-radius:11px;padding:0 26px;display:inline-flex;align-items:center;font-size:14px;font-weight:700;color:#fff;background:#16181B;cursor:pointer\" style-hover=\"background:#000\">{{ goalDetail.cta }} ›<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ BULK 1/2 (Screen_2_A_1_1) ============ -->\n      <sc-if value=\"{{ isBulk1 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:1180px;margin:0 auto\">\n        <div style=\"display:flex;align-items:flex-start;gap:16px;margin-bottom:30px\">\n          <div onclick=\"{{ goGoal }}\" style=\"width:40px;height:40px;border:1px solid #D8DBDE;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#41464C;cursor:pointer;background:#fff;flex:0 0 auto\" style-hover=\"background:#F5F6F7\">‹<\u002Fdiv>\n          <div style=\"font-size:23px;font-weight:800;letter-spacing:-.4px;line-height:1.35;max-width:560px\">Βήμα 1/2: Σε ποιες κατηγορίες &amp; brands θέλεις να ενισχύσεις τις πωλήσεις;<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:26px;align-items:stretch\">\n          <!-- LEFT card -->\n          <div style=\"background:#fff;border-radius:18px;padding:26px 28px;display:flex;flex-direction:column\">\n            <div style=\"font-size:18px;font-weight:800;margin-bottom:16px\">Όλες τις κατηγορίες (25) και όλα τα brands (45)<\u002Fdiv>\n            <div style=\"background:#FAFAF8;border:1px solid #EFEFEA;border-radius:11px;padding:14px 16px;margin-bottom:18px\">\n              <div style=\"font-size:12px;color:#41464C;line-height:1.7;margin-bottom:10px\">\n                <div><b>Πότε χρεώνεσαι:<\u002Fb> Μόνο σε ολοκληρωμένη πώληση.<\u002Fdiv>\n                <div><b>Τελικό κόστος:<\u002Fb> Προμήθεια διαφήμισης + Προμήθεια πώλησης προϊόντος + Κόστος διαχείρισης.<\u002Fdiv>\n                <div><span style=\"background:#FFD400;border-radius:4px;padding:0 4px\">💡<\u002Fspan> <b>Τι είναι το bid:<\u002Fb> Το μέγιστο % προμήθειας που ορίζεις. Η τελική χρέωση μπορεί να είναι χαμηλότερη ανάλογα με τον ανταγωνισμό.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:2fr 1.2fr 1.2fr;font-size:11px;color:#8A9097;padding:6px 0;border-bottom:1px solid #ECECE6\">\n                <div>Κατηγορία<\u002Fdiv><div style=\"text-align:right\">Ελάχ. προμήθεια διαφήμισης<\u002Fdiv><div style=\"text-align:right\">Προμήθεια πώλησης προϊόντος<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ commPreview }}\" as=\"r\" hint-placeholder-count=\"4\">\n                <div style=\"display:grid;grid-template-columns:2fr 1.2f ', impr:'18.420', clicks:'640', ctr:'3,5%', sales:'2', turnover:'820 €', cost:'78 €', roas:'10,5' },\n    { name:'Αντηλιακό spray body SPF30', code:'SKU-22988', bid:'0,28 €', impr:'12.110', clicks:'410', ctr:'3,4%', sales:'1', turnover:'460 €', cost:'52 €', roas:'8,8' },\n    { name:'After sun lotion 300ml', code:'SKU-23044', bid:'0,26 €', impr:'9.870', clicks:'330', ctr:'3,3%', sales:'2', turnover:'720 €', cost:'70 €', roas:'10,3' },\n  ];\n\n  ALL_BID_CHIPS = ['1.0%','2.5%','5.0%','Άλλο'];\n\n  componentDidMount(){\n    window.__go = (screen, goal) => this.setState(goal ? { screen, goal } : { screen });\n    window.__pptxPrep = (h, w) => {\n      const root = document.getElementById('app-root');\n      const main = root && root.querySelector('main');\n      if (root) { root.style.height = h + 'px'; root.style.width = w + 'px'; root.style.minWidth = w + 'px'; root.style.overflow = 'hidden'; }\n      if (main) { main.style.overflow = 'visible'; main.style.paddingBottom = '40px'; }\n    };\n  }\n  go(s){ return () => this.setState({ screen: s }); }\n\n  renderVals() {\n    const screen = this.state.screen;\n    const sw = (on) => ({\n      track:`width:38px;height:21px;border-radius:999px;position:relative;flex:0 0 auto;background:${on?'#1C6FE0':'#CFD3D7'}`,\n      knob:`position:absolute;top:2px;${on?'left:19px':'left:2px'};width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2)`,\n    });\n    const swOn = sw(true);\n\n    // goals\n    const goals = this.GOALS.map(g => {\n      const seld = g.key === this.state.goal;\n      return { ...g,\n        onSelect: () => this.setState({ goal: g.key }),\n        rowStyle: seld ? 'background:#16181B' : 'background:#fff;border:1.5px solid #16181B',\n        titleStyle: seld ? 'color:#fff' : 'color:#16181B',\n      };\n    });\n\n    // bulk1 radios\n    const b1bid = this.state.bulk1Mode === 'bid';\n    const radio = (on) => ({\n      box: on ? 'border:2px solid #1C6FE0' : 'border:2px solid #C7CBCF',\n      inner: on ? 'background:#1C6FE0' : 'background:transparent',\n      row: on ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#fff;border:1.5px solid #E8EAEC',\n    });\n    const r1min = radio(!b1bid), r1bid = radio(b1bid);\n\n    // bulk1 bid chips (inline in the left card)\n    const bulk1Chips = this.ALL_BID_CHIPS.map(c => {\n      const on = this.state.bulk1Bid === c;\n      return { label:c, onClick: () => this.setState({ bulk1Bid:c, bulk1Mode:'bid' }),\n        style: on ? 'background:#1C6FE0;color:#fff' : 'background:#fff;color:#1C6FE0;border:1px solid #B9D2F5' };\n    });\n\n    // bulk2 categories (selection step, toggle opens modal)\n    const bulk2Cats = this.CATS.map(c => ({\n      cat:c.cat, brands:c.brands, min:c.min,\n      swTrack: sw(false).track, swKnob: sw(false).knob,\n      onToggle: () => this.setState({ catModal:true, catStep:1, catName:c.cat, commMode:'common', brandSel:{}, showCost:false }),\n    }));\n\n    // standard categories\n    const stdCats = this.CATS.map(c => ({ ...c }));\n\n    // products (prod1)\n    const products = this.PRODUCTS.map((p,i) => {\n      const checked = !!this.state.selProducts[i];\n      return { ...p, boxStyle: checked ? 'background:#1C6FE0;border:1.5px solid #1C6FE0;color:#fff' : 'background:#fff;border:1.5px solid #CBD0D4;color:transparent',\n        onToggle: () => this.setState(s => ({ selProducts:{ ...s.selProducts, [i]: !s.selProducts[i] } })) };\n    });\n    const clean = (v) => String(v).replace('€','').replace('.',',').trim();\n    const prod2 = this.PRODUCTS.slice(0,6).map((p,i) => {\n      const bid = this.state.prod2Bids[i] ?? clean(p.minbid);\n      return { name:p.name, cat:p.cat, price:p.price, minbid:p.minbid, rec:p.rec, hasRec:p.hasRec, noRec:!p.hasRec, bid,\n        onMin: () => this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: clean(p.minbid) } })),\n        onRec: () => this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: clean(p.rec) } })),\n        onBidChange: (e) => { const v = e.target.value; this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: v } })); },\n        onReset: () => this.setState(s => { const c = { ...s.prod2Bids }; delete c[i]; return { prod2Bids:c }; }),\n      };\n    });\n\n    // brands modal\n    const brandOn = (n) => this.state.brandSel[n] !== false;\n    const brandGroups = this.BRAND_GROUPS.map(g => ({ letter:g.letter, items: g.items.map((b,idx) => {\n      const on = brandOn(b.n); const s = sw(on);\n      return { label:`${b.n} (${b.c} προϊόντα)`, swTrack:s.track, swKnob:s.knob, rowBg: idx%2===0 ? 'background:#F5F6F7' : 'background:#fff',\n        onToggle: () => this.setState(st => ({ brandSel:{ ...st.brandSel, [b.n]: !brandOn(b.n) } })) };\n    }) }));\n    let flat=[]; this.BRAND_GROUPS.forEach(g=>g.items.forEach(b=>flat.push(b)));\n    const brandFlat = flat.map((b,idx) => ({ name:b.n, count:b.c, rowBg: idx%2===0 ? 'background:#F5F6F7' : 'background:#fff' }));\n\n    const commCommon = this.state.commMode === 'common';\n    const catStep = this.state.catStep;\n    const stepTitles = { 1:'Ποια brands θέλεις να διαφημίσεις;', 2:'Όρισε την προμήθεια διαφήμισης', 3:'Όρισε την διάρκεια της διαφήμισης' };\n    const nextLabel = catStep===1 ? 'Επόμενο βήμα: Όρισε προμήθεια' : catStep===2 ? 'Επόμενο βήμα: Όρισε την διάρκεια' : 'Ενεργοποίηση κατηγορίας';\n\n    const catNext = () => {\n      if (catStep < 3) this.setState({ catStep: catStep+1 });\n      else this.setState({ catModal:false, bidApplied:true, screen:'standard' });\n    };\n\n    const otherCampaigns = this.OTHER_CAMPAIGNS.map(c => ({ ...c, onOpen: () => this.setState({ screen:'campaign', campaignSel:c.name }) }));\n    const campaignProducts = this.CAMPAIGN_PRODUCTS.map(c => ({ ...c }));\n\n    return {\n      isDashboard: screen==='dashboard',\n      isGoal: screen==='goal',\n      isBulk1: screen==='bulk1',\n      isBulk2: screen==='bulk2',\n      isStandard: screen==='standard',\n      isProd1: screen==='prod1',\n      isProd2: screen==='prod2',\n      isProd3: screen==='prod3',\n      isCampaign: screen==='campaign',\n\n      ordersNav:this.ORDERS_NAV, afterNav:this.AFTER_NAV, bottomNav:this.BOTTOM_NAV,\n      statStrip:this.STAT_STRIP, chartBars:this.CHART,\n      swOnTrack:swOn.track, swOnKnob:swOn.knob,\n      enisxysiName: this.state.enisxysiActivated ? '25 κατηγορίες & 45 brands' : 'Μαγιώ καλοκαιρι 26',\n      otherCampaigns,\n      campaignName: this.state.campaignSel || 'Παιδικά αντηλιακά',\n      campaignSub: 'Budget 100€ · 10/06/2026 – 10/07/2026 · Στόχος: Νέα προϊόντα',\n      campaignProducts,\n\n      goals, goalDetail: this.GOAL_DETAIL[this.state.goal],\n      commPreview: this.COMM_PREVIEW,\n\n      bulk1MinStyle:r1min.row, bulk1MinDot:r1min.box, bulk1MinInner:r1min.inner,\n      bulk1BidStyle:r1bid.row, bulk1BidDot:r1bid.box, bulk1BidInner:r1bid.inner,\n      setBulk1Min: () => this.setState({ bulk1Mode:'min' }),\n      setBulk1Bid: () => this.setState({ bulk1Mode:'bid' }),\n\n      bulk2Cats, stdCats, products, prod2,\n\n      bulk1Chips,\n      confirmAll: () => this.setState({ enisxysiActivated:true, screen:'dashboard' }),\n      toggleCost: () => this.setState(s => ({ showCost:!s.showCost })),\n\n      // category modal\n      catModal:this.state.catModal, catName:this.state.catName, catStep,\n      catStep1: catStep===1, catStep2: catStep===2, catStep3: catStep===3,\n      catStepTitle: stepTitles[catStep],\n      catFirst: catStep===1, catNotFirst: catStep>1,\n      catNextLabel: nextLabel,\n      closeCatModal: () => this.setState({ catModal:false }),\n      catPrev: () => this.setState({ catStep: Math.max(1, catStep-1) }),\n      catNext,\n      brandGroups, brandFlat,\n      commIsCommon: commCommon, commIsPerbrand: !commCommon,\n      commCommonStyle: commCommon ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#F5F6F7;border:1.5px solid #F5F6F7',\n      commPerbrandStyle: !commCommon ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#F5F6F7;border:1.5px solid #F5F6F7',\n      commCommonText: commCommon ? 'color:#1C6FE0' : 'color:#16181B',\n      commPerbrandText: !commCommon ? 'color:#1C6FE0' : 'color:#16181B',\n      setCommCommon: () => this.setState({ commMode:'common' }),\n      setCommPerbrand: () => this.setState({ commMode:'perbrand' }),\n\n      // nav\n      goDashboard: this.go('dashboard'),\n      goGoal: this.go('goal'),\n      goBulk1: this.go('bulk1'),\n      goBulk2: this.go('bulk2'),\n      goStandard: this.go('standard'),\n      goProd1: this.go('prod1'),\n      goProd2: this.go('prod2'),\n      goProd3: this.go('prod3'),\n      continueGoal: () => this.setState({ screen: this.state.goal==='sales' ? 'bulk1' : 'prod1' }),\n      finishCampaign: () => this.setState({ screen:'dashboard' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
